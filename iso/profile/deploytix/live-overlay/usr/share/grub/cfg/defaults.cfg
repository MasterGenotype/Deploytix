# Deploytix live media should boot the default GRUB entry automatically.
timeout=1

if [ -z "${def_bootlang}" ]; then
    def_bootlang="en_US"
    def_keyboard="us"
    def_timezone="UTC"
fi
if [ -z "${bootlang}" ]; then
    bootlang="lang=${def_bootlang}"
    keyboard="keytable=${def_keyboard}"
    timezone="tz=${def_timezone}"
fi
